## certificate.yaml
## cert-manager Certificate resource — automates TLS for Headlamp Gateway
## Requires cert-manager installed and a ClusterIssuer configured
##
## Install cert-manager:
##   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml

---
# ── ClusterIssuer using Let's Encrypt (production) ────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com       # Replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: headlamp-gateway
                namespace: kube-system
                kind: Gateway

---
# ── Certificate for Headlamp domain ───────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headlamp-tls
  namespace: kube-system
spec:
  secretName: headlamp-tls             # Referenced in gateway.yaml tls.certificateRefs
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - headlamp.example.com             # Replace with your actual domain
  privateKey:
    algorithm: ECDSA
    size: 256
