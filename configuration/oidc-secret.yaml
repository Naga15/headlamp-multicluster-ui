## oidc-secret.yaml
## Store OIDC credentials for Headlamp
## Replace base64 values with: echo -n 'your-value' | base64
## Do NOT commit real credentials — use Vault Secrets Operator (VSO) or Sealed Secrets in production
## NOT really needed for all oidc configuration - Okta integration needs callback urls configured.

apiVersion: v1
kind: Secret
metadata:
  name: headlamp-oidc
  namespace: kube-system
type: Opaque
data:
  clientId: <base64-encoded-client-id>
  clientSecret: <base64-encoded-client-secret>
